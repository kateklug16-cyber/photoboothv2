<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fitz's World Cup 2026 Photo Booth</title>
    <style>
        :root {
            --pitch-green: #1e5a38;
            --stadium-dark: #0d2619;
            --gold: #f1c40f;
            --white: #ffffff;
            --booth-red: #e74c3c;
            --green-action: #2ecc71;
            --admin-gray: #34495e;
            --print-blue: #3498db;
        }

        body {
            margin: 0;
            padding: 25px 10px 15px 10px;
            background: radial-gradient(circle, #1e5a38 0%, var(--stadium-dark) 100%);
            font-family: 'Impact', 'Arial Black', sans-serif;
            color: var(--white);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .booth-widescreen-layout { display: flex; flex-direction: row; gap: 20px; max-width: 960px; width: 100%; justify-content: center; }
        .booth-box { position: relative; width: 640px; height: 480px; border: 10px solid #fff; border-radius: 16px; background-color: #111; overflow: hidden; }
        #boothCanvas { width: 100%; height: 100%; display: block; }
        .right-sidebar-controls { display: flex; flex-direction: column; width: 260px; gap: 12px; }
        .frame-btn { background: #222; color: #fff; border: 3px solid #555; padding: 8px; border-radius: 8px; cursor: pointer; text-transform: uppercase; }
        .frame-btn.active { background: var(--gold); color: #000; border-color: #fff; }
        .snap-btn { background: var(--booth-red); color: white; padding: 15px; border: 4px solid #fff; border-radius: 12px; cursor: pointer; font-size: 1.2rem; }
        .snap-btn:disabled { background: #7f8c8d; cursor: not-allowed; }
        
        #hiddenStitchCanvas, #hiddenPreviewCanvas { display: none !important; }
    </style>
</head>
<body>

    <h1>⚽ FITZ'S 8th BIRTHDAY BOOTH 🏆</h1>

    <div class="booth-widescreen-layout">
        <div class="booth-box">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="boothCanvas" width="640" height="480"></canvas>
        </div>
        <div class="right-sidebar-controls">
            <button class="frame-btn active" id="btn-birthday" onclick="selectFrame('birthday', event)">🎉 Happy Birthday</button>
            <button class="snap-btn" id="snapBtn" onclick="startPhotoSequence()">Take 3-Shot Strip!</button>
        </div>
    </div>

    <div class="admin-dashboard" id="adminDashboard" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:999; padding:20px;">
        <button onclick="document.getElementById('adminDashboard').style.display='none'">Close</button>
        <div id="galleryGrid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;"></div>
    </div>
    <button onclick="document.getElementById('adminDashboard').style.display='flex'">View Queue</button>

    <canvas id="hiddenStitchCanvas"></canvas>
    <canvas id="hiddenPreviewCanvas"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const liveCanvas = document.getElementById('boothCanvas');
        const liveCtx = liveCanvas.getContext('2d');
        const hiddenStitchCanvas = document.getElementById('hiddenStitchCanvas');
        const stitchCtx = hiddenStitchCanvas.getContext('2d');
        const hiddenPreviewCanvas = document.getElementById('hiddenPreviewCanvas');
        const previewCtx = hiddenPreviewCanvas.getContext('2d');
        
        let capturedFrames = [];
        let livePrintQueueMemory = [];
        let currentFrame = 'birthday';

        // Initialize Camera
        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            requestAnimationFrame(renderLoop);
        }

        function renderLoop() {
            liveCtx.save();
            liveCtx.scale(-1, 1);
            liveCtx.drawImage(video, -640, 0, 640, 480);
            liveCtx.restore();
            requestAnimationFrame(renderLoop);
        }

        function selectFrame(f, e) { currentFrame = f; }

        async function startPhotoSequence() {
            capturedFrames = [];
            for(let i=0; i<3; i++) {
                const c = document.createElement('canvas');
                c.width=640; c.height=480;
                c.getContext('2d').drawImage(liveCanvas, 0, 0);
                capturedFrames.push(c);
            }
            generateTwin4x6Sheet();
        }

        function buildSingleStrip() {
            const stripW = 360, targetPhotoH = 270, gap = 16, headerH = 100, footerH = 90, stripMargin = 40;
            const totalW = stripW + (stripMargin * 2);
            const totalH = headerH + (targetPhotoH * 3) + (gap * 2) + footerH + (stripMargin * 2);

            const stripCanvas = document.createElement('canvas');
            stripCanvas.width = totalW;
            stripCanvas.height = totalH;
            const ctx = stripCanvas.getContext('2d');

            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, totalW, totalH);

            capturedFrames.forEach((img, index) => {
                ctx.drawImage(img, 0, 0, 640, 480, stripMargin, stripMargin + headerH + (index * (targetPhotoH + gap)), stripW, targetPhotoH);
            });
            
            // Header/Footer placeholder
            ctx.fillStyle = "#0f4c81";
            ctx.fillRect(stripMargin, stripMargin, stripW, headerH);
            ctx.fillRect(stripMargin, totalH - footerH - stripMargin, stripW, footerH);
            
            return stripCanvas;
        }

        function generateTwin4x6Sheet() {
            const singleStrip = buildSingleStrip();
            hiddenStitchCanvas.width = 1200; hiddenStitchCanvas.height = 800;
            stitchCtx.fillStyle = "#ffffff"; stitchCtx.fillRect(0, 0, 1200, 800);
            
            stitchCtx.save();
            stitchCtx.translate(300, 400); stitchCtx.rotate(-Math.PI/2);
            stitchCtx.drawImage(singleStrip, -singleStrip.height/2, -singleStrip.width/2);
            stitchCtx.restore();

            stitchCtx.save();
            stitchCtx.translate(900, 400); stitchCtx.rotate(-Math.PI/2);
            stitchCtx.drawImage(singleStrip, -singleStrip.height/2, -singleStrip.width/2);
            stitchCtx.restore();

            livePrintQueueMemory.push({ printImg: hiddenStitchCanvas.toDataURL() });
            alert("Strip added to queue!");
        }

        window.onload = startCamera;
    </script>
</body>
</html>
