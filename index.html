<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitz's World Cup 2026 Photo Booth</title>
    <style>
        :root { --pitch-green: #1e5a38; --stadium-dark: #0d2619; --gold: #f1c40f; --white: #ffffff; }
        body { margin: 0; background: radial-gradient(circle, #1e5a38 0%, #0d2619 100%); font-family: sans-serif; color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .booth-box { width: 640px; height: 480px; border: 10px solid #fff; border-radius: 16px; background: #000; overflow: hidden; margin-top: 20px; }
        #boothCanvas { width: 100%; height: 100%; display: block; }
        .controls { margin-top: 20px; }
        .snap-btn { background: #e74c3c; color: white; padding: 15px 30px; border: 3px solid #fff; border-radius: 10px; cursor: pointer; font-size: 1.2rem; }
        #hiddenStitchCanvas, #hiddenPreviewCanvas { display: none; }
    </style>
</head>
<body>

    <h1>⚽ FITZ'S 8th BIRTHDAY BOOTH 🏆</h1>

    <div class="booth-box">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="boothCanvas" width="640" height="480"></canvas>
    </div>

    <div class="controls">
        <button class="snap-btn" onclick="startPhotoSequence()">Take 3-Shot Strip!</button>
        <button onclick="document.getElementById('adminDashboard').style.display='flex'">View Queue</button>
    </div>

    <div id="adminDashboard" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:999; padding:20px; overflow:auto;">
        <button onclick="this.parentElement.style.display='none'">Close</button>
        <div id="galleryGrid" style="display:flex; gap:20px; flex-wrap:wrap; margin-top:20px;"></div>
    </div>

    <canvas id="hiddenStitchCanvas"></canvas>
    <canvas id="hiddenPreviewCanvas"></canvas>

    <script>
        const video = document.getElementById('webcam'), liveCanvas = document.getElementById('boothCanvas'), liveCtx = liveCanvas.getContext('2d');
        const hiddenStitchCanvas = document.getElementById('hiddenStitchCanvas'), stitchCtx = hiddenStitchCanvas.getContext('2d');
        let capturedFrames = [], livePrintQueueMemory = [];

        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            function render() {
                liveCtx.save(); liveCtx.scale(-1, 1);
                liveCtx.drawImage(video, -640, 0, 640, 480);
                liveCtx.restore();
                requestAnimationFrame(render);
            }
            render();
        }

        async function startPhotoSequence() {
            capturedFrames = [];
            for(let i=0; i<3; i++) {
                const c = document.createElement('canvas'); c.width=640; c.height=480;
                c.getContext('2d').drawImage(liveCanvas, 0, 0);
                capturedFrames.push(c);
            }
            generateTwin4x6Sheet();
        }

        function buildSingleStrip() {
            const stripW = 360, photoH = 270, gap = 16, headerH = 100, footerH = 90;
            const stripCanvas = document.createElement('canvas');
            stripCanvas.width = stripW;
            stripCanvas.height = headerH + (photoH * 3) + (gap * 2) + footerH;
            const ctx = stripCanvas.getContext('2d');

            ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, stripW, stripCanvas.height);
            capturedFrames.forEach((img, i) => {
                ctx.drawImage(img, 0, 0, 640, 480, 10, headerH + (i * (photoH + gap)), stripW - 20, photoH);
            });
            ctx.fillStyle = "#0f4c81"; ctx.fillRect(0, 0, stripW, headerH);
            ctx.fillRect(0, stripCanvas.height - footerH, stripW, footerH);
            return stripCanvas;
        }

        function generateTwin4x6Sheet() {
            const strip = buildSingleStrip();
            const border = 20; // This adds your white edge
            const finalW = strip.width + (border * 2);
            const finalH = strip.height + (border * 2);

            hiddenStitchCanvas.width = 1200; hiddenStitchCanvas.height = 800;
            stitchCtx.fillStyle = "#ffffff"; stitchCtx.fillRect(0, 0, 1200, 800);

            // Function to draw one bordered strip
            function drawBorderedStrip(x, y) {
                stitchCtx.save();
                stitchCtx.translate(x, y);
                stitchCtx.rotate(-Math.PI/2);
                // Draw the white background rectangle
                stitchCtx.fillStyle = "#ffffff";
                stitchCtx.fillRect(-finalH/2, -finalW/2, finalH, finalW);
                // Draw the actual strip inside the border
                stitchCtx.drawImage(strip, -strip.height/2, -strip.width/2);
                stitchCtx.restore();
            }

            drawBorderedStrip(300, 400);
            drawBorderedStrip(900, 400);

            livePrintQueueMemory.push(hiddenStitchCanvas.toDataURL());
            alert("Added to queue with border!");
        }

        window.onload = startCamera;
    </script>
</body>
</html>
